<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Timer arc (¾ circle = countdown in progress) -->
  <circle cx="64" cy="64" r="46" fill="none" stroke="url(#ring)" stroke-width="8" stroke-linecap="round"
          stroke-dasharray="217 72" stroke-dashoffset="0" transform="rotate(-90 64 64)"/>
  <!-- Eighth note: stem -->
  <rect x="54" y="22" width="5" height="58" rx="2.5" fill="#e8e8e8"/>
  <!-- Note head -->
  <ellipse cx="56" cy="82" rx="16" ry="13" fill="#e8e8e8"/>
  <!-- Flag -->
  <path d="M59 22 v22 c0 0 18-8 22-12 s2-8-2-10-20 4-20 4 Z" fill="#e8e8e8"/>
  <!-- Accent dot (music playing) -->
  <circle cx="70" cy="78" r="5" fill="#86efac"/>
</svg>
