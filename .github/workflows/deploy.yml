# Deploy static content to GitHub Pages (same pattern as timestables)
name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare deployment
        run: |
          mkdir -p deploy/icons
          cp music-timer.html deploy/index.html
          cp manifest.json deploy/
          cp sw.js deploy/
          cp logo.svg deploy/
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 192 -h 192 deploy/logo.svg -o deploy/icons/icon-192.png
          rsvg-convert -w 512 -h 512 deploy/logo.svg -o deploy/icons/icon-512.png
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
